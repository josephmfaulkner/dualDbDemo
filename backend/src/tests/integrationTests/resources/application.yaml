spring:
  docker:
    compose:
      enabled: false

  application:
    name: dualDBDemo
    storage: 
      engine: postgres # Or 'dynamodb'
  datasource:
    url: jdbc:postgresql://localhost:5432/db
    username: username
    password: password
    driver-class-name: org.postgresql.Driver
  jpa:
    show-sql: true
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  logging:
    bootstrap: 

logging:
  level:
    org.springframework.boot.docker.compose: DEBUG